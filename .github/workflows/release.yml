name: Release

# Tag-triggered release pipeline. Push a tag like v0.1.0 to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Delivers the free trust story end to end:
#   - tests gate the release (a red test cancels everything downstream)
#   - builds the Windows MSI (winget) + the macOS bundle
#   - SHA-256 checksums for every artifact
#   - SLSA build-provenance attestation (publicly verifiable: gh attestation verify <file>)
#   - VirusTotal scan, links folded into the release notes
#   - opens the winget-pkgs PR via winget-releaser
#
# Required repo secrets (Settings -> Secrets and variables -> Actions): see RELEASING.md
#   VT_API_KEY     free VirusTotal API key (https://www.virustotal.com -> API key)
#   WINGET_TOKEN   classic PAT with `public_repo` scope, used to fork/PR microsoft/winget-pkgs
on:
  push:
    tags: ['v*']

env:
  # winget package identity. TODO(markus): confirm — must match the README install command
  # and the identifier on the first manual winget-pkgs submission.
  PACKAGE_ID: MarkusWildgruber.breathpause

jobs:
  # --- Windows: test gate -> bundle -> MSI -------------------------------------------------
  windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Core tests (Pester 5) — release gate
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          $r = Invoke-Pester -Path test/win -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) Pester test(s) failed — aborting release" }
      - name: Build bundle (stamped with the tag)
        shell: pwsh
        env:
          BP_VERSION: ${{ github.ref_name }}
        run: ./build/build-win.ps1
      - name: Install WiX v5
        shell: pwsh
        run: dotnet tool install --global wix
      - name: Build MSI
        shell: pwsh
        run: ./build/build-msi.ps1 -Version ("${{ github.ref_name }}".TrimStart('v'))
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.msi
          if-no-files-found: error

  # --- macOS: test gate -> bundle (experimental, unverified on real hardware) --------------
  macos:
    name: macOS bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Core tests — release gate
        run: bash ./run-tests.sh
      - name: Build bundle (stamped with the tag)
        env:
          BP_VERSION: ${{ github.ref_name }}
        run: bash ./build/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/breathpause.js
          if-no-files-found: error

  # --- Publish: checksums -> provenance -> VirusTotal -> release -> winget PR --------------
  release:
    name: Publish release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release
      id-token: write        # provenance signing
      attestations: write    # provenance attestation
    steps:
      - uses: actions/checkout@v4
      - name: Gather artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten into dist/
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.msi' -o -name '*.js' \) -exec cp {} dist/ \;
          ls -l dist/

      - name: SHA-256 checksums
        run: |
          cd dist
          sha256sum breathpause-*.msi breathpause.js > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/breathpause-*.msi
            dist/breathpause.js

      - name: VirusTotal scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            dist/breathpause-*.msi
            dist/breathpause.js

      - name: Compose release notes
        run: |
          {
            echo "## breathpause ${{ github.ref_name }}"
            echo
            echo "**Windows:** \`winget install breathpause\`  ·  or download the \`.msi\` below."
            echo "**macOS:** download \`breathpause.js\` and run \`osascript -l JavaScript breathpause.js\`. ⚠️ Experimental — not yet verified on real hardware."
            echo
            echo "### Verify it's safe"
            echo "- **VirusTotal scans:**"
            echo '${{ steps.vt.outputs.analysis }}' | tr ',' '\n' | sed 's#^\(.*\)=\(.*\)$#  - [\1](\2)#'
            echo "- **Build provenance:** \`gh attestation verify <file> --repo ${{ github.repository }}\` (proves this artifact was built by this workflow from this commit)."
            echo "- **Checksums:** see \`SHA256SUMS.txt\`. Reproduce: rebuild with \`build/build-win.ps1\` / \`build/build-macos.sh\` and compare."
            echo
            echo "_The MSI is unsigned, so Windows may show an \"unknown publisher\" prompt — that's expected; the checks above are how you verify the file instead._"
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/breathpause-*.msi
            dist/breathpause.js
            dist/SHA256SUMS.txt

      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: ${{ env.PACKAGE_ID }}
          release-tag: ${{ github.ref_name }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
